<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OrthoVerba</title>
  <desc id="desc">A gold eye crossed by a voice waveform on an ink background.</desc>
  <defs>
    <linearGradient id="frame" x1="70" y1="52" x2="448" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182331"/>
      <stop offset="1" stop-color="#080b10"/>
    </linearGradient>
    <linearGradient id="gold" x1="102" y1="147" x2="420" y2="365" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe198"/>
      <stop offset=".48" stop-color="#f1b94b"/>
      <stop offset="1" stop-color="#ca8b22"/>
