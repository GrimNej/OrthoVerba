  <path d="M80 258h88l25-50 30 113 35-158 35 190 31-130 24 35h84" fill="none" stroke="#f8c85f" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="256" cy="257" r="13" fill="#fff1bd"/>
</svg>
