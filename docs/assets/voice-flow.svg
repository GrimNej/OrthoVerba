<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc">
  <title id="title">How OrthoVerba follows a voice</title><desc id="desc">An animated flow from a known script and browser speech alternatives to a stable reading position.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse"><stop stop-color="#0a0d12"/><stop offset="1" stop-color="#111923"/></linearGradient>
    <linearGradient id="signal" x1="120" y1="0" x2="1160" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#70d89b"/><stop offset=".45" stop-color="#f1b94b"/><stop offset="1" stop-color="#ffe198"/></linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.sans{font-family:Inter,Arial,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.edge{stroke-dasharray:8 10;animation:edge 10s linear infinite}.ring{animation:ring 2.8s ease-out infinite;transform-box:fill-box;transform-origin:center}.r2{animation-delay:-.9s}.r3{animation-delay:-1.8s}@keyframes edge{to{stroke-dashoffset:-180}}@keyframes ring{0%,20%{opacity:.6;transform:scale(.55)}85%,100%{opacity:0;transform:scale(1.45)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
  </defs>
  <rect width="1280" height="300" rx="24" fill="url(#bg)"/><rect x="1" y="1" width="1278" height="298" rx="23" fill="none" stroke="#fff" stroke-opacity=".12" stroke-width="2"/>
  <text x="48" y="45" class="mono" fill="#f1b94b" font-size="10" letter-spacing="1.8">FROM SCRIPT TO READING POSITION</text><text x="1232" y="45" text-anchor="end" class="mono" fill="#687584" font-size="8">BOUNDED / REVISION-FENCED / LOCAL UI</text>
  <path id="flow" d="M113 150H1167" fill="none" stroke="url(#signal)" stroke-width="2" class="edge"/>
  <circle r="6" fill="#fff1bd" filter="url(#glow)"><animateMotion dur="7s" repeatCount="indefinite"><mpath href="#flow"/></animateMotion></circle><circle r="4" fill="#70d89b" filter="url(#glow)"><animateMotion dur="7s" begin="-3.5s" repeatCount="indefinite"><mpath href="#flow"/></animateMotion></circle>
  <g transform="translate(115 150)"><circle r="35" fill="#111821" stroke="#70d89b" stroke-opacity=".7"/><circle r="46" fill="none" stroke="#70d89b" stroke-opacity=".25" class="ring"/><path d="M-12-12h24M-12 0h18M-12 12h24" stroke="#70d89b" stroke-width="3" stroke-linecap="round"/><text y="71" text-anchor="middle" class="mono" fill="#70d89b" font-size="8" letter-spacing="1">01 / PREPARE</text><text y="92" text-anchor="middle" class="sans" fill="#edf2f6" font-size="13" font-weight="700">Known script</text><text y="110" text-anchor="middle" class="sans" fill="#768494" font-size="9">Exact source offsets</text></g>
  <g transform="translate(378 150)"><circle r="35" fill="#111821" stroke="#f1b94b" stroke-opacity=".7"/><circle r="46" fill="none" stroke="#f1b94b" stroke-opacity=".25" class="ring r2"/><path d="M-14 3h5l4-12L2 15 8-7l5 10h4" fill="none" stroke="#f1b94b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text y="71" text-anchor="middle" class="mono" fill="#f1b94b" font-size="8" letter-spacing="1">02 / LISTEN</text><text y="92" text-anchor="middle" class="sans" fill="#edf2f6" font-size="13" font-weight="700">Speech alternatives</text><text y="110" text-anchor="middle" class="sans" fill="#768494" font-size="9">Browser-selected service</text></g>
  <g transform="translate(640 150)"><circle r="37" fill="#211b11" stroke="#f1b94b" stroke-opacity=".8"/><circle r="49" fill="none" stroke="#f1b94b" stroke-opacity=".25" class="ring r3"/><circle cx="-12" cy="7" r="5" fill="#70d89b"/><circle cy="-10" r="5" fill="#f1b94b"/><circle cx="13" cy="7" r="5" fill="#ffe198"/><path d="m-8 4 6-8M9 4 3-4" stroke="#edf2f6" stroke-opacity=".65"/><text y="71" text-anchor="middle" class="mono" fill="#f1b94b" font-size="8" letter-spacing="1">03 / ALIGN</text><text y="92" text-anchor="middle" class="sans" fill="#edf2f6" font-size="13" font-weight="700">Worker tracker</text><text y="110" text-anchor="middle" class="sans" fill="#768494" font-size="9">N-best script scoring</text></g>
  <g transform="translate(902 150)"><circle r="35" fill="#111821" stroke="#ffd77e" stroke-opacity=".65"/><path d="M-15 8-7 0l7 6 15-18" fill="none" stroke="#ffd77e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text y="71" text-anchor="middle" class="mono" fill="#ffd77e" font-size="8" letter-spacing="1">04 / STABILIZE</text><text y="92" text-anchor="middle" class="sans" fill="#edf2f6" font-size="13" font-weight="700">Confidence stages</text><text y="110" text-anchor="middle" class="sans" fill="#768494" font-size="9">Provisional to committed</text></g>
  <g transform="translate(1165 150)"><circle r="35" fill="#142019" stroke="#70d89b" stroke-opacity=".75"/><circle r="46" fill="none" stroke="#70d89b" stroke-opacity=".25" class="ring r2"/><path d="M-13 0h26M5-8l8 8-8 8" fill="none" stroke="#70d89b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text y="71" text-anchor="middle" class="mono" fill="#70d89b" font-size="8" letter-spacing="1">05 / FOLLOW</text><text y="92" text-anchor="middle" class="sans" fill="#edf2f6" font-size="13" font-weight="700">Reader surface</text><text y="110" text-anchor="middle" class="sans" fill="#768494" font-size="9">Localized token updates</text></g>
</svg>
