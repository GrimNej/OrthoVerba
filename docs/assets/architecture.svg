<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">OrthoVerba browser-only architecture</title><desc id="desc">A high-level architecture showing React controls, browser speech and audio APIs, a tracking worker, a reader surface, and opt-in IndexedDB.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="430" gradientUnits="userSpaceOnUse"><stop stop-color="#f5f7f4"/><stop offset="1" stop-color="#eaf0eb"/></linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0v28" fill="none" stroke="#0d1117" stroke-opacity=".035"/></pattern>
    <filter id="shadow" x="-20%" y="-30%" width="150%" height="170%"><feDropShadow dx="5" dy="6" stdDeviation="0" flood-color="#0d1117" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4Z" fill="#1d2731"/></marker>
    <style>.sans{font-family:Inter,Arial,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.flow{stroke-dasharray:7 9;animation:flow 10s linear infinite}@keyframes flow{to{stroke-dashoffset:-160}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
  </defs>
  <rect width="1280" height="430" rx="24" fill="url(#bg)"/><rect width="1280" height="430" rx="24" fill="url(#grid)"/><rect x="1" y="1" width="1278" height="428" rx="23" fill="none" stroke="#0d1117" stroke-opacity=".18" stroke-width="2"/>
  <g transform="translate(45 38)"><rect width="43" height="43" rx="12" fill="#0d1117"/><path d="M7 22c4-8 9-12 15-12s11 4 15 12c-4 7-9 11-15 11S11 29 7 22Z" fill="none" stroke="#f1b94b" stroke-width="2"/><path d="M8 22h7l2-5 3 11 3-15 3 18 3-12 2 3h5" fill="none" stroke="#ffd77e" stroke-width="1.5"/></g>
  <text x="104" y="57" class="mono" fill="#606a64" font-size="9" letter-spacing="1.5">SYSTEM AT A GLANCE</text><text x="104" y="82" class="sans" fill="#0d1117" font-size="24" font-weight="750" letter-spacing="-1">All application logic lives in the browser.</text>
  <g class="mono" font-size="7" letter-spacing="1"><circle cx="1010" cy="59" r="5" fill="#f1b94b" stroke="#0d1117"/><text x="1023" y="62" fill="#515b55">SESSION MEMORY</text><circle cx="1144" cy="59" r="5" fill="#70d89b" stroke="#0d1117"/><text x="1157" y="62" fill="#515b55">OPT-IN ONLY</text></g>
  <text x="45" y="129" class="mono" fill="#606a64" font-size="8" letter-spacing="1.4">01 / ACTIVE READING PATH</text>
  <g filter="url(#shadow)">
    <g transform="translate(45 146)"><rect width="272" height="122" rx="14" fill="#0d1117" stroke="#0d1117" stroke-width="2"/><circle cx="26" cy="27" r="9" fill="#f1b94b"/><text x="44" y="30" class="mono" fill="#9ca8b4" font-size="7" letter-spacing="1">REACT 19</text><text x="19" y="67" class="sans" fill="#f2f5f7" font-size="18" font-weight="750">Controls + session state</text><text x="19" y="91" class="sans" fill="#8d99a5" font-size="9">Script, language, actions, metrics</text><text x="19" y="108" class="sans" fill="#8d99a5" font-size="9">No automatic persistence</text></g>
    <g transform="translate(350 146)"><rect width="272" height="122" rx="14" fill="#fff" stroke="#0d1117" stroke-width="2"/><circle cx="26" cy="27" r="9" fill="#70d89b" stroke="#0d1117"/><text x="44" y="30" class="mono" fill="#657068" font-size="7" letter-spacing="1">BROWSER APIS</text><text x="19" y="67" class="sans" fill="#0d1117" font-size="18" font-weight="750">Speech + microphone</text><text x="19" y="91" class="sans" fill="#69736c" font-size="9">N-best recognition alternatives</text><text x="19" y="108" class="sans" fill="#69736c" font-size="9">Compact AudioWorklet telemetry</text></g>
    <g transform="translate(655 146)"><rect width="272" height="122" rx="14" fill="#fff4d6" stroke="#0d1117" stroke-width="2"/><circle cx="26" cy="27" r="9" fill="#f1b94b" stroke="#0d1117"/><text x="44" y="30" class="mono" fill="#657068" font-size="7" letter-spacing="1">DEDICATED WORKER</text><text x="19" y="67" class="sans" fill="#0d1117" font-size="18" font-weight="750">Script-aware tracker</text><text x="19" y="91" class="sans" fill="#69736c" font-size="9">Bounded N-best alignment</text><text x="19" y="108" class="sans" fill="#69736c" font-size="9">Session, epoch, revision fencing</text></g>
    <g transform="translate(960 146)"><rect width="272" height="122" rx="14" fill="#e5f7ec" stroke="#0d1117" stroke-width="2"/><circle cx="26" cy="27" r="9" fill="#70d89b" stroke="#0d1117"/><text x="44" y="30" class="mono" fill="#657068" font-size="7" letter-spacing="1">IMPERATIVE UI</text><text x="19" y="67" class="sans" fill="#0d1117" font-size="18" font-weight="750">Reader surface</text><text x="19" y="91" class="sans" fill="#69736c" font-size="9">Localized token class updates</text><text x="19" y="108" class="sans" fill="#69736c" font-size="9">Reading-band auto-positioning</text></g>
  </g>
  <path d="M317 207h27M622 207h27M927 207h27" fill="none" stroke="#1d2731" stroke-width="1.5" marker-end="url(#arrow)" class="flow"/>
  <rect x="45" y="304" width="1187" height="85" rx="14" fill="#fff" stroke="#0d1117" stroke-width="2"/>
  <rect x="45" y="304" width="260" height="85" rx="14" fill="#111821"/><text x="66" y="332" class="mono" fill="#f1b94b" font-size="8" letter-spacing="1.2">02 / OPTIONAL STORAGE</text><text x="66" y="360" class="sans" fill="#f2f5f7" font-size="17" font-weight="750">IndexedDB, opened on demand</text><text x="66" y="377" class="sans" fill="#8996a3" font-size="9">Only after “Save on this device”</text>
  <text x="338" y="333" class="mono" fill="#69736c" font-size="8" letter-spacing="1.1">PRIVACY INVARIANTS</text><text x="338" y="361" class="sans" fill="#0d1117" font-size="12" font-weight="700">No account</text><circle cx="430" cy="357" r="3" fill="#f1b94b"/><text x="446" y="361" class="sans" fill="#0d1117" font-size="12" font-weight="700">No analytics</text><circle cx="548" cy="357" r="3" fill="#f1b94b"/><text x="564" y="361" class="sans" fill="#0d1117" font-size="12" font-weight="700">No cookies</text><circle cx="654" cy="357" r="3" fill="#f1b94b"/><text x="670" y="361" class="sans" fill="#0d1117" font-size="12" font-weight="700">No backend</text><circle cx="766" cy="357" r="3" fill="#f1b94b"/><text x="782" y="361" class="sans" fill="#0d1117" font-size="12" font-weight="700">No automatic draft</text><circle cx="936" cy="357" r="3" fill="#70d89b"/><text x="952" y="361" class="sans" fill="#0d1117" font-size="12" font-weight="700">Explicit delete controls</text>
</svg>
